<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>style</title>
    <style>
        body :hover{
            text-align: center;
            font-style: italic;
            display: inline-block;
            margin: 2px;
            background-color: purple ;
            cursor: pointer;
              background-size: cover;
            background-image: url('/image/adarsh.jpg');
           
            background-repeat: no-repeat;
        }
            
        
        
        #box-1{
              border: 2px solid;
               padding: 5px;
            
            width: 300px;
            height: 300px;
        }
        #box-1  p{
            background-color: blue;
            display: none;
        }
        #box-1:hover p{
            background-color: yellow;
            display: block;
        }
          
           

        
          #box-2{
              border: 2px solid;
                padding: 5px;
            
            
            width: 300px;
            height: 300px;
        }
         #box-2 p{
            background-color: blue;
            display: none;
        }
         #box-2:hover p{
            background-color: orange;
            display: block;
            
        }
           
          
        
          #box-3{
              border: 2px solid;
                padding: 5px;
            
            width: 300px;
            height: 300px;
        }
         #box-3 p{
            background-color: blue;
            display: none;
        }
         #box-3:hover p{
            background-color:hotpink;
            display: block;
         
        }
           
          
            
        
     
    </style>
</head>
<body>
    <div class="box ">
        <h4 id="box-1">box-1
            <p>this is para of the first box</p>
        </h4>
        <h4 id="box-2">box-2
              <p>this is para of the second box</p>
        </h4>
        <h4 id="box-3">box-3
              <p>this is para of the third box</p>
        </h4>
    </div>

    
</body>
</html>

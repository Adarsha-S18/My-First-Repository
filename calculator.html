<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/calculator.css">
</head>
<body>
    <div id="calculator">
        <input id="display" readonly>
        <div id="keys"> 
            <button class="op" onclick="appendToDisplay('+')">+</button>
            <button class="bt" onclick="appendToDisplay('7')">7</button>
            <button class="bt" onclick="appendToDisplay('8')">8</button>
            <button class="bt" onclick="appendToDisplay('9')">9</button>
            <button class="op" onclick="appendToDisplay('-')">-</button>
            <button class="bt" onclick="appendToDisplay('4')">4</button>
            <button class="bt" onclick="appendToDisplay('5')">5</button>   
             <button class="bt" onclick="appendToDisplay('6')">6</button>         
            <button class="op" onclick="appendToDisplay('*')">*</button>
            <button class="bt" onclick="appendToDisplay('1')">1</button>
            <button class="bt" onclick="appendToDisplay('2')">2</button>
            <button class="bt" onclick="appendToDisplay('3')">3</button>
            <button class="op" onclick="appendToDisplay('/')">/</button>
            <button class="op" onclick="appendToDisplay('.')">.</button>
            <button class="bt" onclick="appendToDisplay('0')">0</button>  
            <button class="bt" onclick="appendToDisplay('00')">00</button>               
            <button class="op" onclick="deleteLast()">DEL</button>

            <button class="op" onclick="calculate('=')">=</button>
           <button class="op" onclick="clearDisplay()">Ac</button>
                                          

        </div>
      
    </div>
    
</body>
<script src="/calculator.js"></script>
</html>
